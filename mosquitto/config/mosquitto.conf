persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# --- MQTT (TCP) для ESP32 в локальной сети ---
listener 1883
protocol mqtt

# --- WebSockets (для отладки/веб-клиентов при необходимости) ---
listener 9001
protocol websockets

# Авторизация: файл паролей обязателен в проде.
# Для первого запуска можно временно включить анонимный доступ (не для прода!).
allow_anonymous false
password_file /mosquitto/config/passwd

# ACL — ограничение топиков по пользователям (см. README).
acl_file /mosquitto/config/acl
