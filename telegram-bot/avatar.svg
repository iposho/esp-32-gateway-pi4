<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Grid lines (PCB style) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- Central glow -->
  <circle cx="256" cy="256" r="140" fill="url(#glow)" opacity="0.4"/>

  <!-- WiFi signal arcs -->
  <g stroke="#4ade80" stroke-width="4" fill="none" filter="url(#neon)" opacity="0.5">
    <path d="M 186 210 A 100 100 0 0 1 326 210"/>
    <path d="M 206 240 A 70 70 0 0 1 306 240"/>
    <path d="M 230 270 A 40 40 0 0 1 282 270"/>
  </g>
  <!-- WiFi dot -->
  <circle cx="256" cy="295" r="4" fill="#4ade80" filter="url(#neon)"/>

  <!-- Microchip body -->
  <rect x="186" y="176" width="140" height="140" rx="16" fill="#1e293b" stroke="#4ade80" stroke-width="3" filter="url(#glowFilter)"/>

  <!-- Chip inner square -->
  <rect x="216" y="206" width="80" height="80" rx="8" fill="#0f172a" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Chip pins - top -->
  <g fill="#4ade80" filter="url(#neon)">
    <!-- Left side pins -->
    <rect x="179" y="196" width="4" height="12" rx="1"/>
    <rect x="179" y="216" width="4" height="12" rx="1"/>
    <rect x="179" y="236" width="4" height="12" rx="1"/>
    <rect x="179" y="256" width="4" height="12" rx="1"/>
    <rect x="179" y="276" width="4" height="12" rx="1"/>
    <rect x="179" y="296" width="4" height="12" rx="1"/>

    <!-- Right side pins -->
    <rect x="329" y="196" width="4" height="12" rx="1"/>
    <rect x="329" y="216" width="4" height="12" rx="1"/>
    <rect x="329" y="236" width="4" height="12" rx="1"/>
    <rect x="329" y="256" width="4" height="12" rx="1"/>
    <rect x="329" y="276" width="4" height="12" rx="1"/>
    <rect x="329" y="296" width="4" height="12" rx="1"/>

    <!-- Top pins -->
    <rect x="196" y="169" width="12" height="4" rx="1"/>
    <rect x="216" y="169" width="12" height="4" rx="1"/>
    <rect x="236" y="169" width="12" height="4" rx="1"/>
    <rect x="256" y="169" width="12" height="4" rx="1"/>
    <rect x="276" y="169" width="12" height="4" rx="1"/>
    <rect x="296" y="169" width="12" height="4" rx="1"/>

    <!-- Bottom pins -->
    <rect x="196" y="339" width="12" height="4" rx="1"/>
    <rect x="216" y="339" width="12" height="4" rx="1"/>
    <rect x="236" y="339" width="12" height="4" rx="1"/>
    <rect x="256" y="339" width="12" height="4" rx="1"/>
    <rect x="276" y="339" width="12" height="4" rx="1"/>
    <rect x="296" y="339" width="12" height="4" rx="1"/>
  </g>

  <!-- Circuit traces from chip -->
  <g stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.3" fill="none">
    <path d="M 179 202 L 150 202 L 150 120"/>
    <path d="M 179 242 L 140 242 L 140 100"/>
    <path d="M 179 282 L 145 282 L 145 140"/>
    <path d="M 329 202 L 360 202 L 360 120"/>
    <path d="M 329 242 L 370 242 L 370 100"/>
    <path d="M 329 282 L 355 282 L 355 140"/>
    <path d="M 202 169 L 202 140 L 120 140"/>
    <path d="M 256 169 L 256 130 L 380 130"/>
    <path d="M 296 169 L 296 145 L 390 145"/>
    <path d="M 216 339 L 216 370 L 130 370"/>
    <path d="M 276 339 L 276 365 L 380 365"/>
  </g>

  <!-- Data dots on traces -->
  <g fill="#4ade80" filter="url(#neon)" opacity="0.6">
    <circle cx="150" cy="120" r="3"/>
    <circle cx="140" cy="100" r="3"/>
    <circle cx="145" cy="140" r="3"/>
    <circle cx="360" cy="120" r="3"/>
    <circle cx="370" cy="100" r="3"/>
    <circle cx="355" cy="140" r="3"/>
    <circle cx="120" cy="140" r="3"/>
    <circle cx="380" cy="130" r="3"/>
    <circle cx="390" cy="145" r="3"/>
    <circle cx="130" cy="370" r="3"/>
    <circle cx="380" cy="365" r="3"/>
  </g>

  <!-- Inner chip details -->
  <g fill="none" stroke="#4ade80" stroke-width="1" stroke-opacity="0.3">
    <rect x="226" y="216" width="60" height="60" rx="4"/>
    <line x1="246" y1="216" x2="246" y2="276"/>
    <line x1="266" y1="216" x2="266" y2="276"/>
    <line x1="226" y1="236" x2="286" y2="236"/>
    <line x1="226" y1="256" x2="286" y2="256"/>
  </g>

  <!-- ESP32 text -->
  <text x="256" y="430" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#4ade80" filter="url(#neon)" letter-spacing="6">
    ESP32
  </text>
  <text x="256" y="460" text-anchor="middle" font-family="monospace" font-size="14" fill="#4ade80" fill-opacity="0.5" letter-spacing="4">
    GATEWAY
  </text>
</svg>
