# ============================================================
# ESP32 Gateway — единый стек для Raspberry Pi
#   admin      — Next.js админка (esp32.kuzyak.in)
#   mosquitto  — MQTT-брокер
#   nodered    — приём MQTT -> запись в self-hosted Supabase
#   telegram-bot — резервное управление через Telegram -> MQTT
#
# Supabase НЕ входит в этот стек — подключаемся к уже
# работающему на Pi Supabase через внешнюю docker-сеть.
# ============================================================

services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esp32-admin
    restart: unless-stopped
    env_file: .env
    environment:
      # Supabase доступен по имени сервиса kong во внешней сети
      SUPABASE_URL: ${SUPABASE_URL:-http://kong:8000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # MQTT-брокер внутри общей внутренней сети
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      # Авторизация админки
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_ENV: production
    ports:
      # Пробрасываем только локально; наружу отдаёт reverse-proxy
      - "3000:3000"
    depends_on:
      - mosquitto
    networks:
      - esp32-internal
      - supabase

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: esp32-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT — сюда подключаются ESP32
      - "9001:9001"   # MQTT over WebSocket (опционально)
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - esp32-internal

  nodered:
    image: nodered/node-red:4.0
    container_name: esp32-nodered
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-Europe/Moscow}
      SUPABASE_URL: ${SUPABASE_URL:-http://kong:8000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Имена, которые использует flow (env.get)
      SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_REST: ${SUPABASE_REST:-http://kong:8000/rest/v1}
      MQTT_USERNAME: ${MQTT_USERNAME:-backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      NODE_RED_CREDENTIAL_SECRET: ${AUTH_SECRET}
    ports:
      - "1880:1880"
    volumes:
      - ./node-red/data:/data
    depends_on:
      - mosquitto
    networks:
      - esp32-internal
      - supabase

  telegram-bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    container_name: esp32-telegram-bot
    restart: unless-stopped
    env_file: .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_DEVICE_MAP: ${TELEGRAM_DEVICE_MAP:-balcony:esp32-balcony,flat:esp32-flat,cam:esp32-cam}
      TELEGRAM_DEFAULT_DEVICE: ${TELEGRAM_DEFAULT_DEVICE:-balcony}
      TELEGRAM_POLL_TIMEOUT: ${TELEGRAM_POLL_TIMEOUT:-30}
      # Через сколько секунд тишины считать online-устройство пропавшим (0 — выключить)
      TELEGRAM_OFFLINE_TIMEOUT: ${TELEGRAM_OFFLINE_TIMEOUT:-120}
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${TELEGRAM_MQTT_USERNAME:-telegram}
      MQTT_PASSWORD: ${TELEGRAM_MQTT_PASSWORD:-}
    depends_on:
      - mosquitto
    networks:
      - esp32-internal

  camelion-bridge:
    build:
      context: ./camelion-bridge
      dockerfile: Dockerfile
    container_name: esp32-camelion-bridge
    restart: unless-stopped
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USER: esp32
      MQTT_PASS: ${CAMELION_MQTT_PASS:-}
      TUYA_ACCESS_ID: ${TUYA_ACCESS_ID:-}
      TUYA_ACCESS_SECRET: ${TUYA_ACCESS_SECRET:-}
      TUYA_DEVICE_ID: ${TUYA_DEVICE_ID:-}
      TUYA_REGION: ${TUYA_REGION:-eu}
    depends_on:
      - mosquitto
    networks:
      - esp32-internal

volumes:
  mosquitto-data:
  mosquitto-log:

networks:
  esp32-internal:
    driver: bridge
  # Внешняя сеть вашего self-hosted Supabase.
  # Узнать имя: docker network ls | grep supabase
  # Обычно это supabase_default. При необходимости задайте
  # SUPABASE_NETWORK в .env.
  supabase:
    external: true
    name: ${SUPABASE_NETWORK:-supabase_default}
